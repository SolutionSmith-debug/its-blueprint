name: lint

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Frontmatter lint
        run: python scripts/lint_frontmatter.py

      - name: Cross-reference lint
        run: python scripts/lint_crossrefs.py
